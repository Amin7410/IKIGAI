name: Build Android APK & Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-apk:
    name: Build Android APK via Node & Capacitor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor & Generate Android Project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp -r index.html css js data icons manifest.json sw.js www/ 2>/dev/null || cp -r index.html css js manifest.json sw.js www/
          npx cap init "IKIGAI" "com.ikigai.app" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Build Android APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "IKIGAI App Android APK Release v1.0.0"
          body: "Tải file `app-debug.apk` cài đặt trực tiếp trên Android."
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
